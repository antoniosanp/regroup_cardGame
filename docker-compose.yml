services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      # e.g. "-Xmx256m" on a memory-constrained VM (free-tier e2-micro is 1GB).
      JAVA_OPTS: ${BACKEND_JAVA_OPTS:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        # Left empty so the built app calls relative URLs and nginx proxies
        # them to `backend` internally — only set this if you're serving the
        # frontend and backend from different origins. See frontend/nginx.conf.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
