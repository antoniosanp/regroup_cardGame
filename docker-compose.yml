services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      # e.g. "-Xmx256m" on a memory-constrained VM (free-tier e2-micro is 1GB).
      JAVA_OPTS: ${BACKEND_JAVA_OPTS:-}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      args:
        # Left empty so the built app calls relative URLs and nginx proxies
        # them to `backend` internally — only set this if you're serving the
        # frontend and backend from different origins. See frontend/nginx.conf.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  # TLS-terminating edge proxy: gets a Let's Encrypt cert for the DuckDNS
  # domain and auto-renews it. Only this container is reachable from the
  # internet; backend/frontend are internal-only (see `expose` above).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
