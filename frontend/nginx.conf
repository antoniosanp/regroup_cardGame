# Serves the built SPA and reverse-proxies the backend's REST + WebSocket
# endpoints on the same origin, so the browser never needs to know the
# backend's address (see VITE_BACKEND_URL in the Dockerfile).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # STOMP over WebSocket (registered at /ws, SockJS-enabled so this also
    # covers its /ws/info and /ws/**/websocket fallback sub-paths).
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # A match can run long — don't let nginx close an idle-looking socket
        # mid-game.
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
